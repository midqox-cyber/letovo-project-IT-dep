<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GreenNet Crisis</title>
<style>
  :root{
    --ground:#0a0a0b; --surface:#131316; --surface-2:#1a1a1e; --surface-3:#232329;
    --border:#2a2a30; --border-strong:#38383f;
    --text:#f2f2f0; --text-dim:#9a9aa0; --text-faint:#5f5f66;
    --accent:#f04e23; --accent-soft:rgba(240,78,35,.14); --accent-strong:#ff6038;
    --c-green:#3fbf6a;  --c-green-soft:rgba(63,191,106,.15);
    --c-red:#e5484d;    --c-red-soft:rgba(229,72,77,.15);
    --c-amber:#f2b01e;  --c-amber-soft:rgba(242,176,30,.15);
    --c-blue:#4a8ff0;   --c-blue-soft:rgba(74,143,240,.15);
    --c-purple:#a06ef0; --c-purple-soft:rgba(160,110,240,.16);
    --ok:#3fbf6a; --warn:#f2b01e; --crit:#e5484d;
    --shadow:0 10px 30px rgba(0,0,0,.45);
    --radius:10px; --radius-sm:7px;
    --mono:"Cascadia Code","Cascadia Mono",Consolas,"SF Mono","JetBrains Mono","Roboto Mono",ui-monospace,monospace;
    --sans:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  }
  @media (prefers-color-scheme: light){
    :root{
      --ground:#f4f4f2; --surface:#ffffff; --surface-2:#f6f6f4; --surface-3:#eeeeeb;
      --border:#e2e2de; --border-strong:#cfcfca;
      --text:#17171a; --text-dim:#5c5c62; --text-faint:#8a8a90;
      --accent:#d8420f; --accent-soft:rgba(216,66,15,.10); --accent-strong:#b8350a;
      --c-green:#1f9d51; --c-green-soft:rgba(31,157,81,.12);
      --c-red:#d43a3f; --c-red-soft:rgba(212,58,63,.10);
      --c-amber:#c98800; --c-amber-soft:rgba(201,136,0,.12);
      --c-blue:#2f6fd6; --c-blue-soft:rgba(47,111,214,.10);
      --c-purple:#7e4fd1; --c-purple-soft:rgba(126,79,209,.12);
      --shadow:0 8px 24px rgba(18,32,27,.10);
    }
  }
  :root[data-theme="dark"]{
    --ground:#0a0a0b; --surface:#131316; --surface-2:#1a1a1e; --surface-3:#232329;
    --border:#2a2a30; --border-strong:#38383f; --text:#f2f2f0; --text-dim:#9a9aa0; --text-faint:#5f5f66;
    --accent:#f04e23; --accent-soft:rgba(240,78,35,.14); --accent-strong:#ff6038;
    --c-green:#3fbf6a; --c-green-soft:rgba(63,191,106,.15); --c-red:#e5484d; --c-red-soft:rgba(229,72,77,.15);
    --c-amber:#f2b01e; --c-amber-soft:rgba(242,176,30,.15); --c-blue:#4a8ff0; --c-blue-soft:rgba(74,143,240,.15);
    --c-purple:#a06ef0; --c-purple-soft:rgba(160,110,240,.16); --shadow:0 10px 30px rgba(0,0,0,.45);
  }
  :root[data-theme="light"]{
    --ground:#f4f4f2; --surface:#ffffff; --surface-2:#f6f6f4; --surface-3:#eeeeeb;
    --border:#e2e2de; --border-strong:#cfcfca; --text:#17171a; --text-dim:#5c5c62; --text-faint:#8a8a90;
    --accent:#d8420f; --accent-soft:rgba(216,66,15,.10); --accent-strong:#b8350a;
    --c-green:#1f9d51; --c-green-soft:rgba(31,157,81,.12); --c-red:#d43a3f; --c-red-soft:rgba(212,58,63,.10);
    --c-amber:#c98800; --c-amber-soft:rgba(201,136,0,.12); --c-blue:#2f6fd6; --c-blue-soft:rgba(47,111,214,.10);
    --c-purple:#7e4fd1; --c-purple-soft:rgba(126,79,209,.12); --shadow:0 8px 24px rgba(18,32,27,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0; padding:0}
  body{font-family:var(--sans); color:var(--text); background:var(--ground); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased}
  button{cursor:pointer; font-family:inherit}
  .mono{font-family:var(--mono)}
  .lbl{font-family:var(--mono); text-transform:uppercase; letter-spacing:.12em; font-size:10.5px; color:var(--text-dim); font-weight:600}
  .tnum{font-variant-numeric:tabular-nums}
  h1,h2,h3,h4{margin:0; font-weight:650; text-wrap:balance}
  ::selection{background:var(--accent-soft)}
  a{color:var(--accent-strong)}

  .shell{display:grid; grid-template-columns:74px minmax(0,1fr) 318px; grid-template-rows:56px minmax(0,1fr);
    grid-template-areas:"rail top top" "rail main side"; height:100vh; max-height:100vh; overflow:hidden}
  .top{grid-area:top; display:flex; align-items:center; gap:16px; padding:0 18px; background:var(--surface); border-bottom:1px solid var(--border); min-width:0}
  .incident{display:flex; align-items:center; gap:11px; min-width:0}
  .pulse-dot{width:9px; height:9px; border-radius:50%; background:var(--crit); flex:none; box-shadow:0 0 0 0 rgba(229,72,77,.5); animation:ring 2s infinite}
  @keyframes ring{0%{box-shadow:0 0 0 0 rgba(229,72,77,.45)}70%{box-shadow:0 0 0 8px rgba(229,72,77,0)}100%{box-shadow:0 0 0 0 rgba(229,72,77,0)}}
  @media (prefers-reduced-motion: reduce){.pulse-dot{animation:none} .marker.focus::after{animation:none} .live-dot{animation:none}}
  .incident .name{font-weight:650; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .incident .code{color:var(--text-dim)}
  .top-spacer{flex:1}
  .clock{font-family:var(--mono); font-size:15px; letter-spacing:.04em}
  .clock .zone{color:var(--text-faint); font-size:11px; margin-left:6px}
  .live{display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-faint)}
  .live-dot{width:7px; height:7px; border-radius:50%; background:var(--ok); animation:blink 2.4s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .who-box{display:flex; align-items:center; gap:9px; padding:5px 8px 5px 11px; background:var(--surface-2); border:1px solid var(--border); border-radius:100px}
  .who-box .who{display:flex; flex-direction:column; line-height:1.15; text-align:right}
  .who-box .who b{font-size:12.5px}
  .avatar{width:30px; height:30px; border-radius:50%; display:grid; place-items:center; font-weight:700; font-size:12px; color:#fff; background:var(--accent); flex:none}
  .icon-btn{width:34px; height:34px; border-radius:8px; background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim); display:grid; place-items:center; font-size:15px}
  .icon-btn:hover{color:var(--text); border-color:var(--border-strong)}
  .icon-btn svg{width:16px;height:16px}

  .rail{grid-area:rail; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:6px}
  .brand{width:40px; height:40px; border-radius:11px; display:grid; place-items:center; margin-bottom:8px; background:linear-gradient(150deg,var(--accent),#b8330f); color:#fff}
  .brand svg{width:23px; height:23px}
  .nav-b{width:52px; padding:9px 0 7px; border-radius:11px; background:transparent; border:1px solid transparent; color:var(--text-dim); display:flex; flex-direction:column; align-items:center; gap:4px; position:relative}
  .nav-b svg{width:20px; height:20px}
  .nav-b span{font-family:var(--mono); font-size:8.5px; text-transform:uppercase; letter-spacing:.05em}
  .nav-b:hover{color:var(--text); background:var(--surface-2)}
  .nav-b.on{color:var(--accent-strong); background:var(--accent-soft); border-color:var(--border)}
  .nav-b .badge{position:absolute; top:3px; right:8px; min-width:16px; height:16px; padding:0 4px; border-radius:9px; background:var(--crit); color:#fff; font-size:10px; font-weight:700; display:grid; place-items:center; font-family:var(--mono); border:2px solid var(--surface)}
  .rail-sp{flex:1}

  .main{grid-area:main; overflow-y:auto; overflow-x:hidden; padding:18px 20px 40px}
  .main::-webkit-scrollbar,.side::-webkit-scrollbar{width:9px}
  .main::-webkit-scrollbar-thumb,.side::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:9px}
  .view-head{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:16px; flex-wrap:wrap}
  .view-head .htext h2{font-size:19px; letter-spacing:-.01em}
  .view-head .htext p{color:var(--text-dim); font-size:12.5px; margin-top:3px; max-width:62ch}

  .side{grid-area:side; background:var(--surface); border-left:1px solid var(--border); overflow-y:auto; padding:16px 15px 30px; display:flex; flex-direction:column; gap:16px}
  .panel{background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:13px}
  .panel > .lbl{display:flex; align-items:center; justify-content:space-between; margin-bottom:11px}
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px}
  .stat{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 11px}
  .stat .n{font-family:var(--mono); font-size:23px; font-weight:600; line-height:1; letter-spacing:-.02em}
  .stat .k{font-size:10.5px; color:var(--text-dim); margin-top:5px; font-family:var(--mono); text-transform:uppercase; letter-spacing:.05em}
  .stat.crit .n{color:var(--crit)} .stat.warn .n{color:var(--warn)} .stat.acc .n{color:var(--accent-strong)} .stat.blue .n{color:var(--c-blue)}
  .ai{background:linear-gradient(180deg,var(--accent-soft),transparent 60%),var(--surface-2)}
  .ai-note{font-size:10.5px; color:var(--text-faint); margin:-4px 0 11px; line-height:1.45}
  .insight{display:flex; gap:9px; padding:9px 0; border-top:1px solid var(--border)}
  .insight:first-of-type{border-top:none}
  .insight .ic{width:22px; height:22px; border-radius:6px; flex:none; display:grid; place-items:center; font-size:12px; margin-top:1px}
  .insight .tx{font-size:12px; line-height:1.45; color:var(--text-dim)}
  .insight .tx b{color:var(--text)}

  .btn{display:inline-flex; align-items:center; gap:7px; padding:8px 13px; border-radius:8px; font-size:12.5px; font-weight:600; border:1px solid var(--border); background:var(--surface-2); color:var(--text)}
  .btn:hover{border-color:var(--border-strong); background:var(--surface-3)}
  .btn svg{width:15px; height:15px}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#fff}
  .btn.primary:hover{background:var(--accent-strong)}
  .btn.sm{padding:5px 9px; font-size:11.5px}
  .btn.ghost{background:transparent}
  .btn.danger{color:var(--c-red); border-color:transparent}
  .btn.danger:hover{background:var(--c-red-soft)}
  .btn:disabled{opacity:.4; cursor:not-allowed}

  .filters{display:flex; gap:7px; flex-wrap:wrap; margin-bottom:14px}
  .chip{display:inline-flex; align-items:center; gap:6px; padding:6px 11px; border-radius:100px; font-size:12px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); font-weight:600}
  .chip .d{width:8px; height:8px; border-radius:50%}
  .chip:hover{color:var(--text)}
  .chip.on{color:var(--text); border-color:var(--border-strong); background:var(--surface-2)}
  .chip.on[data-on-color]{box-shadow:inset 0 0 0 1px currentColor}

  .composer{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:13px; margin-bottom:16px}
  .type-pick{display:flex; gap:7px; flex-wrap:wrap; margin-bottom:11px}
  .tp{display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:8px; font-size:11.5px; font-weight:600; border:1px solid var(--border); background:var(--surface-2); color:var(--text-dim)}
  .tp .d{width:8px;height:8px;border-radius:50%}
  .tp.on{color:var(--text); border-color:currentColor}
  .tp:disabled{opacity:.35; cursor:not-allowed}
  .composer textarea{width:100%; min-height:62px; resize:vertical; background:var(--surface-2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px 11px; font-family:inherit; font-size:13.5px; line-height:1.5}
  .composer textarea:focus{outline:none; border-color:var(--accent)}
  .composer .row2{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:10px; flex-wrap:wrap}
  .cap-hint{font-size:11px; color:var(--text-faint); display:flex; align-items:center; gap:6px}
  .cap-hint svg{width:12px;height:12px}

  .feed{display:flex; flex-direction:column; gap:11px}
  .msg{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:13px 14px; border-left:3px solid var(--mc,var(--border))}
  .msg-top{display:flex; align-items:center; gap:9px; margin-bottom:7px; flex-wrap:wrap}
  .type-tag{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:3px 9px; border-radius:100px; color:var(--mc); background:var(--mc-soft)}
  .type-tag .d{width:8px; height:8px; border-radius:50%; background:var(--mc)}
  .msg-top .author{font-weight:650; font-size:12.5px}
  .msg-top .dept{color:var(--text-dim); font-size:11.5px}
  .msg-top .time{color:var(--text-faint); font-family:var(--mono); font-size:11px; margin-left:auto}
  .msg-body{font-size:13.5px; line-height:1.55; white-space:pre-wrap; word-break:break-word}
  .msg-foot{display:flex; align-items:center; gap:8px; margin-top:10px; flex-wrap:wrap}
  .vstate{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; padding:3px 9px; border-radius:6px}
  .vstate.unverified{color:var(--warn); background:var(--c-amber-soft)}
  .vstate.verified{color:var(--ok); background:var(--c-green-soft)}
  .vstate.rejected{color:var(--crit); background:var(--c-red-soft)}
  .vstate svg{width:12px;height:12px}
  .msg-foot .by{font-size:11px; color:var(--text-faint)}
  .msg-foot .acts{margin-left:auto; display:flex; gap:7px}
  .empty{text-align:center; padding:40px 20px; color:var(--text-faint)}
  .empty svg{width:34px; height:34px; opacity:.5; margin-bottom:10px}

  .board{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:13px}
  .col{background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:11px; min-height:120px}
  .col-h{display:flex; align-items:center; justify-content:space-between; margin-bottom:11px}
  .col-h .t{display:flex; align-items:center; gap:8px; font-family:var(--mono); text-transform:uppercase; font-size:11px; letter-spacing:.06em; font-weight:700}
  .col-h .t .d{width:9px; height:9px; border-radius:3px}
  .col-h .cnt{font-family:var(--mono); font-size:11px; color:var(--text-faint)}
  .col.new .d{background:var(--text-dim)} .col.prog .d{background:var(--c-blue)} .col.done .d{background:var(--ok)}
  .task{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:11px; margin-bottom:9px}
  .task:last-child{margin-bottom:0}
  .task h4{font-size:13px; margin-bottom:6px; line-height:1.35}
  .task.done h4{text-decoration:line-through; color:var(--text-dim)}
  .task .desc{font-size:11.5px; color:var(--text-dim); margin-bottom:9px; line-height:1.45}
  .task .tmeta{display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:9px}
  .tpill{font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.04em; padding:3px 7px; border-radius:5px; background:var(--surface-3); color:var(--text-dim); display:inline-flex; align-items:center; gap:4px}
  .tpill.due{color:var(--warn)} .tpill.over{color:var(--crit); background:var(--c-red-soft)}
  .task .tacts{display:flex; gap:6px; flex-wrap:wrap}

  .kb-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(255px,1fr)); gap:13px}
  .kb-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; display:flex; flex-direction:column; gap:9px}
  .kb-card .cat{display:inline-flex; align-items:center; gap:6px; align-self:flex-start; font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.06em; padding:3px 8px; border-radius:100px; color:var(--mc); background:var(--mc-soft)}
  .kb-card h4{font-size:14px; line-height:1.3}
  .kb-card .kb-body{font-size:12.5px; color:var(--text-dim); line-height:1.5}
  .kb-card .kb-foot{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:auto; padding-top:8px; border-top:1px solid var(--border)}
  .kb-card .kb-foot .who{font-size:11px; color:var(--text-faint)}
  .kb-card .kb-foot .time{font-family:var(--mono); font-size:10.5px; color:var(--text-faint); margin-left:auto}

  .map-wrap{display:grid; grid-template-columns:minmax(0,1fr) 210px; gap:14px}
  .map-stage{position:relative; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; aspect-ratio:16/10; min-height:340px}
  .map-stage svg.terrain{position:absolute; inset:0; width:100%; height:100%}
  .marker{position:absolute; transform:translate(-50%,-50%); cursor:pointer; z-index:2}
  .marker .mk-core{width:20px; height:20px; display:grid; place-items:center; font-size:11px}
  .marker.focus .mk-core{width:15px; height:15px; border-radius:50%; background:var(--mk,var(--c-green)); box-shadow:0 0 12px var(--mk,var(--c-green))}
  .marker.focus::after{content:""; position:absolute; left:50%; top:50%; width:15px; height:15px; border-radius:50%; transform:translate(-50%,-50%); background:var(--mk,var(--c-green)); opacity:.5; animation:mpulse 2.2s infinite}
  @keyframes mpulse{0%{transform:translate(-50%,-50%) scale(1); opacity:.5}70%{transform:translate(-50%,-50%) scale(3.4); opacity:0}100%{opacity:0}}
  .marker.lab .mk-core,.marker.drone .mk-core,.marker.team .mk-core,.marker.intake .mk-core{background:var(--surface); border:1.5px solid var(--mk); border-radius:6px; color:var(--mk); font-size:11px; width:24px; height:24px}
  .marker.drone .mk-core{border-radius:50%}
  .marker .mk-lb{position:absolute; left:50%; top:calc(100% + 3px); transform:translateX(-50%); white-space:nowrap; font-family:var(--mono); font-size:9.5px; color:var(--text-dim); background:var(--surface); padding:1px 5px; border-radius:4px; border:1px solid var(--border)}
  .marker:hover{z-index:5} .marker:hover .mk-lb{color:var(--text); border-color:var(--border-strong)}
  .safe-zone{position:absolute; transform:translate(-50%,-50%); border:1.5px dashed var(--ok); background:var(--c-green-soft); border-radius:14px; z-index:1; display:grid; place-items:end center; padding-bottom:5px}
  .safe-zone span{font-family:var(--mono); font-size:9px; text-transform:uppercase; letter-spacing:.05em; color:var(--ok)}
  .legend{background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:13px; align-self:start}
  .legend h4{font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.1em; color:var(--text-dim); margin-bottom:11px}
  .legend .lg{display:flex; align-items:center; gap:9px; padding:6px 0; font-size:12px}
  .legend .lg .m{width:16px; height:16px; flex:none; display:grid; place-items:center; font-size:10px}
  .legend .lg .m.dot{border-radius:50%}
  .legend .lg .m.sq{border-radius:4px; border:1.5px solid currentColor}
  .legend .lg small{display:block; color:var(--text-faint); font-size:10.5px}

  .log-item{display:grid; grid-template-columns:58px 18px 1fr; gap:11px; align-items:start; padding:8px 0}
  .log-item .lt{font-family:var(--mono); font-size:11.5px; color:var(--text-dim); text-align:right; padding-top:1px}
  .log-rail{position:relative; display:grid; place-items:center}
  .log-rail .ld{width:9px; height:9px; border-radius:50%; background:var(--accent); z-index:1; margin-top:5px; box-shadow:0 0 0 3px var(--surface)}
  .log-rail::before{content:""; position:absolute; top:0; bottom:-16px; width:1.5px; background:var(--border)}
  .log-item:last-child .log-rail::before{display:none}
  .log-item .lc{font-size:12.5px; line-height:1.45; color:var(--text-dim)}
  .log-item .lc b{color:var(--text)}
  .log-item .lc .who{font-family:var(--mono); font-size:10.5px; color:var(--text-faint)}

  /* Admin table */
  .utable{width:100%; border-collapse:collapse; font-size:13px}
  .utable th{text-align:left; font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); padding:8px 10px; border-bottom:1px solid var(--border); font-weight:600}
  .utable td{padding:9px 10px; border-bottom:1px solid var(--border); vertical-align:middle}
  .utable tr:hover td{background:var(--surface-2)}
  .utable .uname{font-weight:600} .utable .ulogin{font-family:var(--mono); font-size:11.5px; color:var(--text-faint)}
  .rolebadge{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.04em; padding:3px 8px; border-radius:100px; background:var(--surface-3); color:var(--text-dim)}

  .modal-bg{position:fixed; inset:0; background:rgba(4,10,8,.62); display:grid; place-items:center; z-index:50; padding:20px; backdrop-filter:blur(3px)}
  .modal{background:var(--surface); border:1px solid var(--border-strong); border-radius:14px; box-shadow:var(--shadow); width:100%; max-width:480px; max-height:88vh; overflow:auto; padding:20px}

  .field{margin-bottom:13px}
  .field label{display:block; font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-dim); margin-bottom:6px}
  .field input,.field textarea,.field select{width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:9px 11px; font-family:inherit; font-size:13px}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none; border-color:var(--accent)}
  .two-col{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .modal-acts{display:flex; gap:9px; justify-content:flex-end; margin-top:18px}
  .form-err{color:var(--c-red); font-size:12px; margin-top:4px; min-height:16px}

  /* Login */
  .login-wrap{position:fixed; inset:0; display:grid; place-items:center; padding:22px; overflow:auto;
    background:radial-gradient(120% 90% at 50% -10%, #10231d, var(--ground))}
  .login-card{width:100%; max-width:410px; background:var(--surface); border:1px solid var(--border-strong); border-radius:16px; box-shadow:var(--shadow); overflow:hidden}
  .login-hero{padding:24px 26px 18px; border-bottom:1px solid var(--border); background:linear-gradient(180deg,var(--accent-soft),transparent)}
  .login-hero .row{display:flex; align-items:center; gap:12px}
  .login-hero .logo{width:44px; height:44px; border-radius:12px; background:linear-gradient(150deg,var(--accent),#b8330f); display:grid; place-items:center; color:#fff}
  .login-hero .logo svg{width:26px;height:26px}
  .login-hero h1{font-size:21px; letter-spacing:-.01em}
  .login-hero h1 .mono{color:var(--accent-strong)}
  .login-hero p{color:var(--text-dim); font-size:12px; margin-top:8px}
  .login-body{padding:22px 26px 24px}
  .login-body .field input{padding:11px 13px; font-size:14px}
  .login-demo{margin-top:16px; border-top:1px solid var(--border); padding-top:14px}
  .login-demo summary{cursor:pointer; font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim)}
  .login-demo table{width:100%; margin-top:10px; font-size:11.5px; border-collapse:collapse}
  .login-demo td{padding:3px 6px; color:var(--text-dim)}
  .login-demo td:first-child{font-family:var(--mono); color:var(--text)}
  .login-demo .use{color:var(--accent-strong); cursor:pointer; text-decoration:underline}

  .toast-wrap{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); z-index:90; display:flex; flex-direction:column; gap:8px; align-items:center}
  .toast{background:var(--surface-3); border:1px solid var(--border-strong); color:var(--text); padding:9px 15px; border-radius:100px; font-size:12.5px; box-shadow:var(--shadow); display:flex; align-items:center; gap:9px; animation:tin .25s ease}
  .toast .d{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .toast.err .d{background:var(--c-red)}
  @keyframes tin{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}

  @media (max-width:1150px){ .shell{grid-template-columns:74px minmax(0,1fr); grid-template-areas:"rail top" "rail main"} .side{display:none} }
  @media (max-width:720px){
    .shell{grid-template-columns:1fr; grid-template-rows:52px minmax(0,1fr) 60px; grid-template-areas:"top" "main" "rail"}
    .rail{flex-direction:row; border-right:none; border-top:1px solid var(--border); padding:0 6px; overflow-x:auto}
    .brand,.rail-sp{display:none}
    .nav-b{flex:1; min-width:56px; padding:7px 0 5px}
    .board{grid-template-columns:1fr} .map-wrap{grid-template-columns:1fr}
    .top{padding:0 12px; gap:10px} .clock .zone,.live span{display:none} .who-box .who{display:none}
    .main{padding:14px 12px 30px}
  }
  /* News */
  .news-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:13px}
  .news-card{background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--mc); border-radius:var(--radius); padding:14px; display:flex; flex-direction:column; gap:8px}
  .news-card.critical{background:linear-gradient(180deg,var(--mc-soft),transparent 42%),var(--surface)}
  .nc-top{display:flex; align-items:center; justify-content:space-between; gap:8px}
  .nc-lv{font-family:var(--mono); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--mc); background:var(--mc-soft); padding:3px 9px; border-radius:100px}
  .news-card h4{font-size:15px; line-height:1.25}
  .news-card p{font-size:12.5px; color:var(--text-dim); line-height:1.5; margin:0; white-space:pre-wrap; word-break:break-word}
  .nc-foot{display:flex; align-items:center; gap:8px; margin-top:auto; padding-top:9px; border-top:1px solid var(--border); font-size:11px; color:var(--text-faint)}
  .nc-foot .time{margin-left:auto; font-family:var(--mono)}

  /* Schedule */
  .sched-clock{display:flex; align-items:center; gap:24px; flex-wrap:wrap; background:linear-gradient(180deg,var(--accent-soft),transparent 70%),var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; margin-bottom:16px}
  .big-clock{font-family:var(--mono); font-size:clamp(32px,6vw,44px); font-weight:600; letter-spacing:.02em; line-height:1}
  .big-clock .zone{font-size:13px; color:var(--text-faint); margin-left:8px}
  .sched-clock .lbl{margin-bottom:6px}
  .next-ev{padding-left:24px; border-left:1px solid var(--border)}
  .next-ev .ne-t{font-size:14px; margin-top:5px} .next-ev .ne-t b{font-family:var(--mono); color:var(--accent-strong)}
  @media(max-width:520px){ .next-ev{padding-left:0; border-left:none} }
  .sched-list{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:4px 15px}
  .srow{display:grid; grid-template-columns:52px 16px 1fr auto; gap:12px; align-items:center; padding:11px 0; border-top:1px solid var(--border)}
  .srow:first-child{border-top:none}
  .srow .st{font-family:var(--mono); font-size:13px; color:var(--text-dim); font-weight:600}
  .sdot{position:relative; display:grid; place-items:center; align-self:stretch}
  .sdot i{width:9px;height:9px;border-radius:50%;background:var(--border-strong); z-index:1}
  .sdot::before{content:"";position:absolute;top:0;bottom:0;width:1.5px;background:var(--border)}
  .srow:first-child .sdot::before{top:50%} .srow:last-child .sdot::before{bottom:50%}
  .srow .sc b{font-size:13.5px; display:block; line-height:1.3} .srow .sc small{font-size:11.5px; color:var(--text-faint); font-family:var(--mono)}
  .srow.now .st{color:var(--accent-strong)} .srow.now .sdot i{background:var(--accent); box-shadow:0 0 10px var(--accent)}
  .srow.done{opacity:.5} .srow.done .sc b{text-decoration:line-through}
  .now-pill{font-family:var(--mono); font-size:9px; color:var(--accent-strong); border:1px solid var(--accent); border-radius:100px; padding:1px 7px; margin-left:7px; vertical-align:middle; display:inline-block}
  .sacts{display:flex; gap:5px}

  /* Side "air" panel */
  .air-row{padding:9px 0; border-top:1px solid var(--border)}
  .air-row:first-child{border-top:none; padding-top:0}
  .air-k{font-family:var(--mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-faint)}
  .air-v{font-size:12.5px; margin-top:3px; line-height:1.4} .air-v b{color:var(--accent-strong)}

  /* Copyright / license */
  .portal-login{margin-top:14px}
  .pl-or{display:flex; align-items:center; gap:10px; color:var(--text-faint); font-size:10.5px; text-transform:uppercase; letter-spacing:.1em; margin:2px 0 12px}
  .pl-or::before,.pl-or::after{content:""; flex:1; height:1px; background:var(--border)}
  .portal-btn{width:100%; justify-content:center; border-color:var(--accent); color:var(--accent-strong)}
  .portal-btn:hover{background:var(--accent-soft)}
  #portal-box{margin-top:10px; display:flex; flex-direction:column; gap:8px}
  #pt-token{width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:9px 11px; font-family:var(--mono); font-size:12px; line-height:1.5; resize:vertical}
  #pt-token:focus{outline:none; border-color:var(--accent)}
  .login-copy{margin-top:16px; padding-top:14px; border-top:1px solid var(--border); text-align:center; font-size:11px; color:var(--text-faint)}
  .lic-link{color:var(--accent-strong); cursor:pointer; border-bottom:1px dotted currentColor}
  .lic-link:hover{color:var(--accent)}
  .lic-body{font-size:13px; line-height:1.6; color:var(--text-dim); display:flex; flex-direction:column; gap:10px}
  .lic-body b{color:var(--text)}
  .side-copy{margin-top:auto; padding-top:14px; text-align:center; font-size:10px; color:var(--text-faint); font-family:var(--mono); letter-spacing:.04em}

  /* Departments + chats */
  .depts-wrap{display:grid; grid-template-columns:300px minmax(0,1fr); gap:16px}
  .depts-list{display:flex; flex-direction:column; gap:8px}
  .deptc{display:flex; align-items:center; gap:12px; text-align:left; width:100%; padding:12px 13px; border-radius:12px; background:var(--surface); border:1px solid var(--border); color:var(--text)}
  .deptc:hover{border-color:var(--border-strong); background:var(--surface-2)}
  .deptc.on{border-color:var(--accent); background:var(--accent-soft)}
  .deptc-ic{width:34px; height:34px; flex:none; display:grid; place-items:center; color:var(--text-dim)}
  .deptc.on .deptc-ic{color:var(--accent-strong)}
  .deptc-ic svg{width:22px; height:22px}
  .deptc-t{flex:1; min-width:0}
  .deptc-t b{font-size:13.5px; display:block; line-height:1.2}
  .deptc-t small{color:var(--text-dim); font-size:11px; display:block; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .deptc-n{font-family:var(--mono); font-size:12px; color:var(--text-faint); background:var(--surface-2); border:1px solid var(--border); border-radius:100px; min-width:26px; height:22px; display:grid; place-items:center; padding:0 6px}
  .dept-detail{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; min-width:0}
  .dd-head{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; padding-bottom:14px; border-bottom:1px solid var(--border); margin-bottom:14px}
  .dd-title h3{font-size:17px} .dd-title p{color:var(--text-dim); font-size:12.5px; margin-top:4px}
  .dd-lead{display:flex; align-items:center; gap:10px; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:8px 12px}
  .dd-crown{color:var(--c-amber)} .dd-crown svg{width:20px; height:20px}
  .dd-lead small{font-family:var(--mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint); display:block}
  .dd-lead b{font-size:13px}
  .dd-nolead{color:var(--text-faint); font-size:12px}
  .dd-cols{display:grid; grid-template-columns:minmax(0,1fr) 210px; gap:16px}
  .dd-lbl{display:flex; align-items:center; gap:7px; font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim); margin-bottom:10px}
  .dd-lbl svg{width:14px; height:14px}
  .chan-feed{display:flex; flex-direction:column; gap:9px; max-height:46vh; overflow-y:auto; padding-right:4px; margin-bottom:11px}
  .chan-msg{background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:9px 11px}
  .chan-top{display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap}
  .chan-top b{font-size:12.5px}
  .chan-role{font-family:var(--mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--accent-strong); background:var(--accent-soft); padding:2px 6px; border-radius:100px}
  .chan-time{margin-left:auto; color:var(--text-faint); font-size:11px}
  .chan-del{background:none; border:none; color:var(--text-faint); cursor:pointer; font-size:15px; line-height:1; padding:0 2px}
  .chan-del:hover{color:var(--c-red)}
  .chan-body{font-size:13px; line-height:1.5; white-space:pre-wrap; word-break:break-word}
  .chan-composer{display:flex; flex-direction:column; gap:8px}
  .chan-composer textarea{width:100%; min-height:54px; resize:vertical; background:var(--surface-2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:9px 11px; font-family:inherit; font-size:13px; line-height:1.5}
  .chan-composer textarea:focus{outline:none; border-color:var(--accent)}
  .chan-composer .btn{align-self:flex-end}
  .dd-members{border-left:1px solid var(--border); padding-left:16px}
  .mem{display:flex; align-items:center; gap:9px; padding:7px 0; border-bottom:1px solid var(--border)}
  .mem:last-child{border-bottom:none}
  .mem-av{width:26px; height:26px; flex:none; border-radius:50%; background:var(--surface-3); display:grid; place-items:center; font-size:10px; font-weight:700; color:var(--text-dim)}
  .mem-n{flex:1; min-width:0; font-size:12.5px; font-weight:600; display:flex; align-items:center; gap:5px}
  .mem-crown{color:var(--c-amber); display:inline-flex} .mem-crown svg{width:14px; height:14px}
  .mem-r{font-size:10px; color:var(--text-faint); font-family:var(--mono); text-transform:uppercase; letter-spacing:.03em; white-space:nowrap}
  .empty-sm{color:var(--text-faint); font-size:12px; text-align:center; padding:16px 0}
  @media(max-width:900px){ .depts-wrap{grid-template-columns:1fr} .dd-cols{grid-template-columns:1fr} .dd-members{border-left:none; padding-left:0; border-top:1px solid var(--border); padding-top:12px} }

  /* Finance (энеоины) */
  .fin-total{display:flex; flex-direction:column; align-items:flex-end; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:8px 14px}
  .fin-total small{font-family:var(--mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint)}
  .fin-total b{font-size:16px; color:var(--accent-strong)}
  .fin-wrap{display:grid; grid-template-columns:minmax(0,1fr) 320px; gap:16px}
  .acc-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; margin-bottom:16px}
  .acc-card{background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 13px}
  .acc-d{font-size:12px; color:var(--text-dim); margin-bottom:7px; line-height:1.3; min-height:2.4em}
  .acc-b{font-family:var(--mono); font-size:18px; font-weight:600; color:var(--text)}
  .acc-u{font-size:11px; color:var(--text-faint)}
  .fin-form{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px}
  .fin-grid{display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr) 96px; gap:10px; margin-bottom:10px}
  .fin-grid label{display:flex; flex-direction:column; gap:5px; min-width:0; font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim)}
  .fin-grid select,.fin-grid input,.fin-note-in{width:100%; min-width:0; max-width:100%; box-sizing:border-box; background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 10px; font-family:var(--sans); font-size:12.5px; text-transform:none; letter-spacing:0}

  .fin-form .btn{width:100%; justify-content:center}
  .tx-list{display:flex; flex-direction:column; gap:8px; max-height:64vh; overflow-y:auto; padding-right:4px}
  .tx-row{display:grid; grid-template-columns:26px 1fr auto; gap:10px; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:9px 11px}
  .tx-ico{width:26px; height:26px; border-radius:50%; display:grid; place-items:center; background:var(--surface-3); color:var(--text-dim); font-weight:700; font-family:var(--mono)}

  .tx-meta{font-size:10px; color:var(--text-faint); font-family:var(--mono); margin-top:3px}
  .tx-amt{font-family:var(--mono); font-size:13px; font-weight:600; white-space:nowrap}
  .dd-bal{display:flex; align-items:center; gap:9px; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:8px 12px}
  .dd-bal-ic{color:var(--accent-strong); display:inline-flex} .dd-bal-ic svg{width:20px; height:20px}
  .dd-bal small{font-family:var(--mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint); display:block}
  .dd-bal b{font-size:14px}
  @media(max-width:900px){ .fin-wrap{grid-template-columns:1fr} .fin-grid{grid-template-columns:1fr 1fr} }

  /* Auth tabs & registration */
  .auth-tabs{display:flex; gap:6px; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:4px; margin-bottom:16px}
  .auth-tab{flex:1; padding:8px 6px; border-radius:7px; background:transparent; border:none; color:var(--text-dim); font-weight:600; font-size:13px; font-family:inherit; transition:background .16s ease, color .16s ease}
  .auth-tab.on{background:var(--accent); color:#fff}
  .terms-check{display:flex; gap:9px; align-items:flex-start; margin:2px 0 10px; font-size:12px; color:var(--text-dim); line-height:1.45; cursor:pointer}
  .terms-check input{margin-top:1px; width:16px; height:16px; accent-color:var(--accent); flex:none}
  .terms-check .lnk{color:var(--accent-strong); text-decoration:underline; cursor:pointer}
  .reg-note{font-size:11px; color:var(--text-faint); background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:8px 10px; margin-bottom:12px; line-height:1.4}

  /* Animations */
  @keyframes viewIn{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none}}
  @keyframes popIn{from{opacity:0; transform:scale(.965)} to{opacity:1; transform:none}}
  @keyframes fadeBg{from{opacity:0} to{opacity:1}}
  @keyframes floatIn{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}
  #main.view-in{animation:viewIn .32s cubic-bezier(.2,.7,.2,1)}
  .login-card{animation:popIn .42s cubic-bezier(.2,.7,.2,1)}
  .modal{animation:popIn .22s cubic-bezier(.2,.7,.2,1)}
  .modal-bg{animation:fadeBg .18s ease}
  .toast{will-change:transform,opacity}
  .msg,.kb-card,.news-card,.task,.stat{transition:transform .16s ease, border-color .16s ease, box-shadow .16s ease}
  .msg:hover,.kb-card:hover,.news-card:hover{transform:translateY(-2px); border-color:var(--border-strong); box-shadow:0 6px 20px rgba(0,0,0,.28)}
  .btn{transition:transform .08s ease, background .16s ease, border-color .16s ease}
  .btn:active{transform:translateY(1px)}
  .icon-btn{transition:transform .12s ease, color .16s ease, border-color .16s ease}
  .icon-btn:active{transform:scale(.9)}
  .chip,.tp{transition:transform .1s ease, border-color .16s ease, color .16s ease, background .16s ease}
  .chip:active,.tp:active{transform:scale(.95)}
  .nav-b{transition:background .16s ease, color .16s ease, border-color .16s ease}
  .nav-b.on svg{animation:popIn .3s ease}
  .role-opt{transition:transform .12s ease, border-color .16s ease, background .16s ease}
  .role-opt:active{transform:scale(.99)}
  .srow.now .sdot i{transition:box-shadow .2s ease}

  /* Google × Gemini visual system */
  :root{
    --ground:#f7f9fc; --surface:#ffffff; --surface-2:#f3f6fb; --surface-3:#e9eef7;
    --border:#e2e8f0; --border-strong:#c9d4e3;
    --text:#1f1f1f; --text-dim:#5f6368; --text-faint:#8b929a;
    --accent:#1a73e8; --accent-soft:rgba(26,115,232,.10); --accent-strong:#1558b0;
    --c-green:#1e8e5a; --c-green-soft:rgba(30,142,90,.11);
    --c-red:#d93025; --c-red-soft:rgba(217,48,37,.10);
    --c-amber:#e37400; --c-amber-soft:rgba(227,116,0,.11);
    --c-blue:#1a73e8; --c-blue-soft:rgba(26,115,232,.10);
    --c-purple:#8e63ce; --c-purple-soft:rgba(142,99,206,.11);
    --shadow:0 8px 30px rgba(60,64,67,.13); --radius:18px; --radius-sm:13px;
    --gemini:linear-gradient(135deg,#4285f4 4%,#7c72dc 43%,#a564c9 68%,#d96570 100%);
    --sans:"Google Sans","Product Sans","Segoe UI Variable Text","Segoe UI",system-ui,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --ground:#0f1115; --surface:#171a20; --surface-2:#1e222a; --surface-3:#292e38;
      --border:#303641; --border-strong:#46505f; --text:#e8eaed; --text-dim:#aeb4bd; --text-faint:#737b87;
      --accent:#8ab4f8; --accent-soft:rgba(138,180,248,.13); --accent-strong:#aecbfa;
      --shadow:0 14px 40px rgba(0,0,0,.34);
    }
  }
  :root[data-theme="light"]{
    --ground:#f7f9fc; --surface:#ffffff; --surface-2:#f3f6fb; --surface-3:#e9eef7;
    --border:#e2e8f0; --border-strong:#c9d4e3; --text:#1f1f1f; --text-dim:#5f6368; --text-faint:#8b929a;
    --accent:#1a73e8; --accent-soft:rgba(26,115,232,.10); --accent-strong:#1558b0;
    --c-green:#1e8e5a; --c-green-soft:rgba(30,142,90,.11); --c-red:#d93025; --c-red-soft:rgba(217,48,37,.10);
    --c-amber:#e37400; --c-amber-soft:rgba(227,116,0,.11); --c-blue:#1a73e8; --c-blue-soft:rgba(26,115,232,.10);
    --c-purple:#8e63ce; --c-purple-soft:rgba(142,99,206,.11); --shadow:0 8px 30px rgba(60,64,67,.13);
  }
  :root[data-theme="dark"]{
    --ground:#0f1115; --surface:#171a20; --surface-2:#1e222a; --surface-3:#292e38;
    --border:#303641; --border-strong:#46505f; --text:#e8eaed; --text-dim:#aeb4bd; --text-faint:#737b87;
    --accent:#8ab4f8; --accent-soft:rgba(138,180,248,.13); --accent-strong:#aecbfa;
    --c-green:#81c995; --c-green-soft:rgba(129,201,149,.12); --c-red:#f28b82; --c-red-soft:rgba(242,139,130,.12);
    --c-amber:#fdd663; --c-amber-soft:rgba(253,214,99,.12); --c-blue:#8ab4f8; --c-blue-soft:rgba(138,180,248,.12);
    --c-purple:#c58af9; --c-purple-soft:rgba(197,138,249,.12); --shadow:0 14px 40px rgba(0,0,0,.34);
  }
  body{background:
    radial-gradient(circle at 15% -10%,rgba(66,133,244,.12),transparent 31%),

    radial-gradient(circle at 20% 10%,rgba(66,133,244,.20),transparent 34%),

  .sensor-map-layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:13px;align-items:stretch}

  .sensor-map{position:relative;isolation:isolate;aspect-ratio:1.0046/1;min-height:440px;overflow:hidden;background:radial-gradient(circle at 18% 12%,rgba(66,133,244,.13),transparent 31%),linear-gradient(145deg,#edf7ff,#dfeffa)}.sensor-map::after{content:"";position:absolute;inset:0;z-index:1;background-image:linear-gradient(rgba(66,133,244,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(66,133,244,.055) 1px,transparent 1px);background-size:12.5% 12.5%;pointer-events:none}.sensor-brazil-shape{position:absolute;inset:0;z-index:0;width:100%;height:100%;object-fit:fill;opacity:.96}.sensor-coord{position:absolute;z-index:2;padding:4px 6px;border-radius:7px;background:color-mix(in srgb,var(--surface) 82%,transparent);color:var(--text-faint);font-size:8.5px;pointer-events:none}.sensor-coord.nw{top:9px;left:10px}.sensor-coord.se{right:10px;bottom:9px}.sensor-place{position:absolute;z-index:2;color:rgba(27,94,55,.48);font-size:9px;font-weight:650;letter-spacing:.13em;text-transform:uppercase;pointer-events:none;text-shadow:0 1px 2px rgba(255,255,255,.8)}.sensor-place.amazon{left:23%;top:28%}.sensor-place.brasilia{left:55%;top:51%;font-size:7.5px}.sensor-place.sao-paulo{left:58%;top:71%;font-size:7.5px}.sensor-place.atlantic{right:2.5%;top:53%;width:18%;color:rgba(45,103,158,.38);font-size:7.5px;line-height:1.5;text-align:center}.sensor-compass{position:absolute;right:14px;top:13px;z-index:2;width:25px;height:34px;color:#285f87;text-align:center;font-size:9px;pointer-events:none}.sensor-compass i{display:block;width:1px;height:17px;margin:2px auto 0;background:#285f87}.sensor-compass i::before{content:"";display:block;width:6px;height:6px;border-left:1px solid #285f87;border-top:1px solid #285f87;transform:translate(-2.5px,1px) rotate(45deg)}

  function cycleTheme(){ U.theme = U.theme==="auto"?"light":U.theme==="light"?"dark":"auto"; applyTheme(); saveUI(); toast("Тема: "+({auto:"как в системе",light:"светлая",dark:"тёмная"}[U.theme])); }

  /* ---------------- Boot ---------------- */
  async function boot(){
    applyTheme();
    try{
      const r = await api("/api/me");
      DEMO_ON = !!(r && r.demo);
      REG_ON = !!(r && r.registration);
      PORTAL_ON = !!(r && r.portal);
      if(r.user){ ME=r.user; CAPS=r.caps; await enterApp(); return; }
      // авто-вход через портал: ?portal_token=... (когда встроены/пришли по редиректу)
      const pt = new URLSearchParams(location.search).get("portal_token");
      if(PORTAL_ON && pt){ if(await portalLogin(pt)) return; }
    }catch(e){}
    renderLogin();
  }

    stopPoll();
    await loadState();
    renderShell();
    renderAll();
    startClock();
    startPoll();

  async function portalLogin(token){
    const err=el("pt-err"); if(err) err.textContent="";
    token=(token||"").trim(); if(!token){ if(err) err.textContent="Вставьте токен портала"; return false; }
    try{
      const r=await api("/api/auth/portal","POST",{token});
      ME=r.user; CAPS=r.caps; await enterApp(); toast("Вход через портал: "+ME.name); return true;
    }catch(ex){ const m=ex.error||"Ошибка входа через портал"; if(err) err.textContent=m; else toast(m,true); return false; }
  }
  async function doLogin(e){
    if(e) e.preventDefault();
    const u=el("lg-user").value.trim(), p=el("lg-pass").value;
    const err=el("lg-err"); err.textContent="";
    if(!u||!p){ err.textContent="Введите логин и пароль"; return; }
    const btn=el("lg-go"); btn.disabled=true;
    try{
      const r = await api("/api/login","POST",{username:u, password:p});
      ME=r.user; CAPS=r.caps; await enterApp(); toast("Добро пожаловать, "+ME.name);
    }catch(ex){ err.textContent = ex.error||"Ошибка входа"; btn.disabled=false; }
  }
  async function doRegister(e){
    if(e) e.preventDefault();
    const err=el("rg-err"); err.textContent="";
    const username=el("rg-user").value.trim();
    const first_name=el("rg-first").value.trim();
    const last_name=el("rg-last").value.trim();
    const dept=el("rg-dept").value;
    const pass=el("rg-pass").value, pass2=el("rg-pass2").value;
    if(!username||!first_name||!last_name){ err.textContent="Заполните логин, имя и фамилию"; return; }
    if(pass.length<6){ err.textContent="Пароль минимум 6 символов"; return; }
    if(pass!==pass2){ err.textContent="Пароли не совпадают"; return; }
    if(!el("rg-terms").checked){ err.textContent="Нужно принять пользовательское соглашение"; return; }
    const btn=el("rg-go"); btn.disabled=true;
    try{
      const r=await api("/api/register","POST",{username, first_name, last_name, dept, password:pass, accept_terms:true});
      ME=r.user; CAPS=r.caps; await enterApp(); toast("Регистрация успешна. Добро пожаловать, "+ME.name);
    }catch(ex){ err.textContent=ex.error||"Ошибка регистрации"; btn.disabled=false; }
  }

  function insight(cv, sym, html){ return `<div class="insight"><span class="ic" style="background:var(${cv}-soft);color:var(${cv})">${sym}</span><span class="tx">${html}</span></div>`; }
  function aiInsights(active, unver, overdue){
    const out=[];
    if(active.length>=2) out.push(insight("--c-red","➤",`Обнаружено <b>${active.length}</b> очага вдоль течения реки. Высокий риск <b>коридора распространения</b> к водозабору — приоритет на изоляцию русла.`));
    const dup = clusterMessages(); if(dup) out.push(insight("--c-purple","⿻",dup));
    if(unver>0) out.push(insight("--c-amber","!",`<b>${unver}</b> сообщени${plural(unver,"е","я","й")} ждут проверки. Старшим специалистам стоит подтвердить их до принятия решений.`));
    if(overdue>0) out.push(insight("--c-red","⏱",`<b>${overdue}</b> задач${plural(overdue,"а","и","")} просрочен${overdue===1?"а":"о"}. Рекомендуется перераспределить силы.`));
    else { const l=deptLoad(); if(l) out.push(insight("--c-blue","≋",l)); }
    if(!out.length) out.push(insight("--c-green","✓","Обстановка стабильна: новых очагов и просрочек нет."));
    return out.join("");
  }
  function plural(n,a,b,c){ n=Math.abs(n)%100; const n1=n%10; if(n>10&&n<20)return c; if(n1>1&&n1<5)return b; if(n1===1)return a; return c; }
  function clusterMessages(){
    const stop=new Set(["очаг","участок","река","летовки","воды","вода","нужны","нужно","сектор","после","через","около","примерно"]);
    const map={};
    S.messages.forEach(m=>{ const w=(m.text.toLowerCase().match(/[а-яё0-9№]{4,}/g)||[]); new Set(w).forEach(x=>{ if(!stop.has(x)){ (map[x]=map[x]||0); map[x]++; } }); });
    let best=null; Object.keys(map).forEach(w=>{ if(map[w]>=2&&(!best||map[w]>best.n)) best={w,n:map[w]}; });
    if(best) return `Слово «<b>${esc(best.w)}</b>» встречается в ${best.n} сообщениях — возможно, один инцидент. Стоит объединить карточки.`;
    return null;
  }
  function deptLoad(){ const c={}; S.tasks.filter(t=>t.status!=="done").forEach(t=>c[t.dept]=(c[t.dept]||0)+1); const a=Object.entries(c).sort((x,y)=>y[1]-x[1]); if(a.length&&a[0][1]>=2) return `Наибольшая нагрузка — <b>${esc(a[0][0])}</b> (${a[0][1]} задач). При необходимости привлеките волонтёров.`; return null; }

  function filterBar(){
    const counts={all:S.messages.length}; Object.keys(S.msg_types).forEach(k=>counts[k]=S.messages.filter(m=>m.type===k).length);
    const chips=[`<button class="chip ${U.filter==="all"?"on":""}" data-filter="all">Все <span class="tnum" style="color:var(--text-faint)">${counts.all}</span></button>`]
      .concat(Object.keys(S.msg_types).map(k=>{ const on=U.filter===k; const cv=MSG_COLOR[k];

    return `<div class="filters">${chips.join("")}</div>`;
  }
  function composerHTML(){
    if(CAPS.post==="none") return "";
    if(!S.msg_types[U.composerType]) U.composerType="focus";   // тип из localStorage мог устареть
    const basicOnly = CAPS.post==="basic";
    if(basicOnly && !S.msg_types[U.composerType].basic) U.composerType="focus";
    const types = Object.keys(S.msg_types).map(k=>{ const dis=basicOnly&&!S.msg_types[k].basic; const on=k===U.composerType&&!dis; const cv=MSG_COLOR[k];
      return `<button class="tp ${on?"on":""}" data-ctype="${k}" ${dis?"disabled":""} style="${on?`color:var(${cv})`:""}"><span class="d" style="background:var(${cv})"></span>${esc(S.msg_types[k].label)}</button>`; }).join("");

  function msgCard(m){
    const cv = MSG_COLOR[m.type]||"--border"; const label=(S.msg_types[m.type]||{}).label||m.type;
    const canVerify = CAPS.verify && m.verify==="unverified";
    const vlabel = m.verify==="verified"?"Подтверждено":m.verify==="rejected"?"Отклонено":"Не подтверждено";

    const by = m.verified_by ? `<span class="by">${m.verify==="verified"?"проверил":"отклонил"}: ${esc(m.verified_by)}</span>` : "";
    const canTask = CAPS.task_create!=="none";
    let acts="";
    if(canTask) acts += `<button class="btn sm ghost" data-msg-task="${m.id}" title="Создать задачу">${I.plus} В задачу</button>`;
    if(canVerify) acts += `<button class="btn sm ghost" data-reject="${m.id}">${I.x} Отклонить</button><button class="btn sm primary" data-verify="${m.id}">${I.check} Подтвердить</button>`;
    if(CAPS.decide) acts += `<button class="btn sm danger" data-del-msg="${m.id}" title="Удалить (модерация)">${I.trash}</button>`;
    return `<article class="msg" style="${cvar(cv)}">
        <div class="msg-top">
          <span class="type-tag"><span class="d"></span>${esc(label)}</span>
          <span class="author">${esc(m.author_name)}</span><span class="dept">· ${esc(m.dept)}</span>

  }

    const deptChanged = renderDepartments._dept !== sel;

    const roster = S.roster || [];
    const headOf = d => roster.find(u=>u.dept===d && u.role==="dept_head")
                     || roster.find(u=>u.dept===d && (u.role==="hq_head" || u.role==="admin"));

  const SENSOR_PARAM_LABELS={
    battery:"Батарея",CO2:"CO₂",GH:"Общая жёсткость",KH:"Карбонатная жёсткость",NH4:"Аммоний",NO2:"Нитриты",NO3:"Нитраты",

    air_temp:"Температура воздуха",conductivity:"Проводимость",dissolved_O2:"Растворённый O₂",pH:"pH",soil_light:"Освещённость почвы",
    soil_moisture:"Влажность почвы",soil_temp:"Температура почвы",turbidity:"Мутность",water_temp:"Температура воды",
    wind_direction:"Направление ветра",wind_speed:"Скорость ветра"

  const BRAZIL_BOUNDS={minLon:-73.9856,maxLon:-34.7932,minLat:-33.7439,maxLat:5.2673};
  const SENSOR_TYPE_PURPOSE={
    water:"контролирует качество поверхностной воды и помогает замечать химические или биологические отклонения",
    soil:"отслеживает состояние почвы, влажность и условия для растительности",
    air:"измеряет состояние атмосферы, погодные условия и возможное загрязнение воздуха"
  };
  function sensorFieldMs(value){ if(!value) return NaN; return Date.parse(String(value).replace(" ","T")+"Z"); }
  function sensorFresh(sensor,mission){ const a=sensorFieldMs(mission),b=sensorFieldMs(sensor.last_timestamp); return isFinite(a)&&isFinite(b)&&(a-b)<=180000; }
  function sensorBrazilArea(sensor,withPreposition=false){
    const lat=Number(sensor.latitude),lon=Number(sensor.longitude);
    if(!isFinite(lat)||!isFinite(lon)) return "неопределённый район";
    let area;
    if(lat>-10) area=lon<-55?"северо-запад":lon>-44?"северо-восток":"север";
    else if(lat<-23) area=lon<-53?"юго-запад":lon>-46?"юго-восток":"юг";
    else area=lon<-55?"запад":lon>-46?"восток":"центр";
    if(!withPreposition) return `${area} Бразилии`;
    return "в "+({"северо-запад":"северо-западной части Бразилии","северо-восток":"северо-восточной части Бразилии",север:"северной части Бразилии","юго-запад":"юго-западной части Бразилии","юго-восток":"юго-восточной части Бразилии",юг:"южной части Бразилии",запад:"западной части Бразилии",восток:"восточной части Бразилии",центр:"центральной части Бразилии"}[area]);
  }
  function sensorDescription(sensor,mission){
    const kind={water:"Водный",soil:"Почвенный",air:"Атмосферный"}[sensor.sensor_type]||"Экологический";
    const primary=Object.entries(sensor.parameters||{}).filter(([,r])=>r.primary).slice(0,5).map(([name])=>SENSOR_PARAM_LABELS[name]||name);
    const bad=Object.values(sensor.parameters||{}).filter(r=>r.quality_flag==="WARN"||r.quality_flag==="FAIL").length;
    const hasBattery=sensor.battery_percent!=null&&isFinite(Number(sensor.battery_percent)),battery=hasBattery?Number(sensor.battery_percent):NaN,batteryText=hasBattery?`Заряд батареи ${sensorValue(battery)}%.`:"Сведения о батарее пока не получены.";
    const linkText=sensorFresh(sensor,mission)?"Станция передавала данные в последние три минуты.":sensor.last_timestamp?`Последний пакет получен ${sensor.last_timestamp}.`:"Текущая телеметрия станции пока недоступна.";
    const metrics=primary.length?`Основные наблюдения: ${primary.join(", ")}.`:"Набор основных показаний будет добавлен после следующей передачи.";
    const quality=bad?`В ${bad} показаниях есть предупреждения или критические отклонения.`:"Доступные показания не содержат предупреждений качества.";
    return `${kind} зонд ${sensor.sensor_id} расположен ${sensorBrazilArea(sensor,true)} и ${SENSOR_TYPE_PURPOSE[sensor.sensor_type]||"ведёт экологический мониторинг территории"}. ${metrics} ${linkText} ${batteryText} ${quality}`;
  }
  function sensorMetric(sensor,param){
    if(param==="battery") return {value:sensor.battery_percent,unit:"%",quality:null};
    const row=(sensor.parameters||{})[param]; return row||{value:null,unit:"",quality_flag:null};
  }
  function sensorValue(value){ return value==null||!isFinite(Number(value))?"—":Number(value).toLocaleString("ru-RU",{maximumFractionDigits:3}); }
  function sensorQuality(sensor){
    const q=Object.values(sensor.parameters||{}).map(x=>x.quality_flag).filter(Boolean);
    return q.includes("FAIL")?"FAIL":q.includes("WARN")?"WARN":q.length?"OK":"—";
  }
  function sensorColor(sensor,param,min,max){
    const metric=sensorMetric(sensor,param); const quality=metric.quality_flag;
    if(quality==="FAIL") return "#ea4335"; if(quality==="WARN") return "#f9ab00";
    const value=Number(metric.value); if(metric.value==null||!isFinite(value)) return "#9aa0a6";
    if(param==="battery") return value<25?"#ea4335":value<55?"#f9ab00":"#34a853";
    const t=max>min?Math.max(0,Math.min(1,(value-min)/(max-min))):.5;
    return `hsl(${218+92*t} 72% ${54+4*t}%)`;
  }

  function sensorMapHTML(all,filtered,param,selected){
    const B=BRAZIL_BOUNDS;
    const coords=all.filter(s=>isFinite(s.latitude)&&isFinite(s.longitude)&&s.longitude>=B.minLon&&s.longitude<=B.maxLon&&s.latitude>=B.minLat&&s.latitude<=B.maxLat);
    if(!coords.length) return `<div class="sensor-map-card"><div class="empty-sm">Нет координат для отображения.</div></div>`;
    const shown=filtered.filter(s=>coords.some(c=>c.sensor_id===s.sensor_id));
    const metrics=shown.map(s=>Number(sensorMetric(s,param).value)).filter(Number.isFinite),min=metrics.length?Math.min(...metrics):0,max=metrics.length?Math.max(...metrics):1;
    const markers=shown.map(s=>{
      const x=(s.longitude-B.minLon)/(B.maxLon-B.minLon)*100,y=(B.maxLat-s.latitude)/(B.maxLat-B.minLat)*100,metric=sensorMetric(s,param),color=sensorColor(s,param,min,max);
      const label=`${s.sensor_id} · ${SENSOR_PARAM_LABELS[param]||param}: ${sensorValue(metric.value)} ${metric.unit||""}`;
      return `<button class="sensor-marker ${s.sensor_type} ${selected&&selected.sensor_id===s.sensor_id?"selected":""}" style="left:${x.toFixed(3)}%;top:${y.toFixed(3)}%;--sensor-color:${color}" data-sensor-id="${esc(s.sensor_id)}" title="${esc(label)}" aria-label="${esc(label)}"><i></i></button>`;
    }).join("");
    const metricLabel=SENSOR_PARAM_LABELS[param]||param;
    return `<section class="sensor-map-card"><div class="sensor-map-title"><div><b>Карта Бразилии</b><span>реальные широта и долгота · система WGS 84</span></div><div class="sensor-map-count">Показано <b>${shown.length}</b></div></div>
      <div class="sensor-map">
        <img class="sensor-brazil-shape" src="/static/brazil-states.svg" alt="Границы штатов Бразилии по данным IBGE">
        <span class="sensor-place amazon">Амазония</span><span class="sensor-place brasilia">Бразилиа</span><span class="sensor-place sao-paulo">Сан-Паулу</span><span class="sensor-place atlantic">Атлантический океан</span>
        <span class="sensor-compass"><b>С</b><i></i></span>
        <span class="sensor-coord nw">5,27° с.ш. · 73,99° з.д.</span><span class="sensor-coord se">33,74° ю.ш. · 34,79° з.д.</span>${markers}
      </div>
      <div class="sensor-map-legend"><span><i class="water"></i>Вода</span><span><i class="soil"></i>Почва</span><span><i class="air"></i>Воздух</span><span class="sensor-map-credit">Границы штатов: IBGE</span><span class="metric"><b>${esc(metricLabel)}</b>: ${sensorValue(min)} — ${sensorValue(max)}</span></div></section>`;
  }
  function sensorDetailHTML(sensor,mission){
    if(!sensor) return `<aside class="sensor-detail"><div class="groups-empty room-empty">${I.sensors}<b>Зонды не найдены</b><span>Измените фильтр или поисковый запрос.</span></div></aside>`;
    const rows=Object.entries(sensor.parameters||{}).sort((a,b)=>(+!a[1].primary)-(+!b[1].primary)||a[0].localeCompare(b[0])).map(([name,row])=>{
      const q=(row.quality_flag||"missing").toLowerCase();
      return `<div class="sensor-reading"><span><b>${esc(SENSOR_PARAM_LABELS[name]||name)}</b><small>${row.primary?"основной":"технический"} · ${esc(row.timestamp||"—")}</small></span><strong>${sensorValue(row.value)} <i>${esc(row.unit||"")}</i></strong><em class="q-${q}">${esc(row.quality_flag||"—")}</em></div>`;
    }).join("");
    const hasBattery=sensor.battery_percent!=null&&isFinite(Number(sensor.battery_percent)),battery=hasBattery?Math.max(0,Math.min(100,Number(sensor.battery_percent))):0,quality=sensorQuality(sensor);
    return `<aside class="sensor-detail"><div class="sensor-detail-head ${sensor.sensor_type}"><span class="sensor-detail-icon">${I.sensors}</span><div><h3>${esc(sensor.sensor_id)}</h3><p>${esc(SENSOR_TYPE_LABELS[sensor.sensor_type]||sensor.sensor_type)} · пакет #${esc(sensor.packet_id==null?"—":sensor.packet_id)}</p></div><span class="sensor-fresh ${sensorFresh(sensor,mission)?"on":""}">${sensorFresh(sensor,mission)?"на связи":"нет свежих данных"}</span></div>
      <div class="sensor-description"><span>Описание зонда</span><p>${esc(sensorDescription(sensor,mission))}</p></div>
      <div class="sensor-detail-meta"><div><span>Район карты</span><b>${esc(sensorBrazilArea(sensor))}</b></div><div><span>Координаты</span><b>${Number(sensor.latitude).toFixed(5)}, ${Number(sensor.longitude).toFixed(5)}</b></div><div><span>Последняя передача</span><b>${esc(sensor.last_timestamp||"—")}</b></div></div>
      <div class="sensor-health"><div class="sensor-battery" style="--battery:${battery}"><b>${hasBattery?battery.toFixed(0)+"%":"—"}</b><span>батарея</span></div><div><span>Качество пакета</span><b class="quality-${quality.toLowerCase()}">${esc(quality)}</b><small>${Object.keys(sensor.parameters||{}).length} параметров</small></div></div>
      <div class="sensor-readings-head"><b>Текущие показания</b><span>${rows?"полевой срез":"нет данных"}</span></div><div class="sensor-readings">${rows||'<div class="empty-sm">Показания отсутствуют</div>'}</div></aside>`;

  function sensorListHTML(filtered,param,selected){

  function financeForm(cur){
    const opts=(S.depts||[]).map(d=>`<option value="${esc(d)}">${esc(d)}</option>`).join("");

  async function financeSend(){
    const err=el("fin-err"); if(err) err.textContent="";
    const from=el("fin-from")?el("fin-from").value:"";
    const to=el("fin-to").value;
    const amount=parseInt(el("fin-amount").value,10);
    const note=el("fin-note").value;
    if(!to){ if(err) err.textContent="Выберите получателя"; return; }
    if(!(amount>0)){ if(err) err.textContent="Введите сумму больше нуля"; return; }
    if(from && from===to){ if(err) err.textContent="Отправитель и получатель совпадают"; return; }
    try{ await api("/api/finance/tx","POST",{from:from||null, to, amount, note}); await refresh(); toast("Операция проведена"); }
    catch(e){ if(e.status===401){handleAuthErr(e);} else if(err){err.textContent=e.error||"Ошибка";} else toast(e.error||"Ошибка",true); }
  }

  function taskCard(t){
    const over = t.status!=="done" && t.due && new Date(t.due)<serverNow();
    const duePill = t.status==="done"?`<span class="tpill">${I.check} закрыта</span>`:(t.due?`<span class="tpill ${over?"over":"due"}">⏱ до ${hm(t.due)}</span>`:"");
    const canClose = t.status!=="done" && (CAPS.task_close==="all" || (CAPS.task_close==="own" && t.dept===ME.dept));
    const canAdvance = t.status==="new" && CAPS.task_create!=="none";
    let acts="";
    if(canAdvance) acts+=`<button class="btn sm ghost" data-task-start="${t.id}">${I.arrow} В работу</button>`;
    if(canClose) acts+=`<button class="btn sm primary" data-task-done="${t.id}">${I.check} Закрыть</button>`;
    return `<div class="task ${t.status==="done"?"done":""}">
        <h4>${esc(t.title)}</h4>${t.descr?`<div class="desc">${esc(t.descr)}</div>`:""}
        <div class="tmeta"><span class="tpill">${esc(t.dept)}</span><span class="tpill">👤 ${esc(t.assignee)}</span>${duePill}</div>
        <div class="tacts">${acts}</div></div>`;
  }

  /* ---- Schedule ---- */
  function renderSchedule(){
    const canManage = CAPS.decide;
    const items = (S.schedule||[]).slice().sort((a,b)=> toMins(a.at)-toMins(b.at));
    const nm = minsNow();
    let nowIdx=-1; for(let i=0;i<items.length;i++){ if(toMins(items[i].at)<=nm) nowIdx=i; }
    const head = `<div class="view-head"><div class="htext"><h2>Расписание смены</h2>
      <p>Единый график. Время реальное — текущий пункт подсвечивается автоматически. Ведёт штаб.</p></div>
      ${canManage?`<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn ghost" data-import-sched>Импорт</button><button class="btn primary" data-new-sched>${I.plus} Пункт</button></div>`:""}</div>`;
    const banner = `<div class="sched-clock">
      <div><div class="lbl">Текущее время · МСК</div><div class="big-clock tnum js-clock">--:--:--</div></div>
      ${nextInfo(items, nm)}</div>`;
    if(!items.length){ el("main").innerHTML = head + banner + `<div class="empty">${I.sched}<div>Расписание пустое.${canManage?" Добавьте первый пункт или импортируйте список.":""}</div></div>`; tickClock(); return; }
    const rows = items.map((s,i)=>{
      const m=toMins(s.at); const state = i===nowIdx ? "now" : (m<nm ? "done" : "up");
      const kind = S.sched_kinds[s.kind]||"";
      const sub = [kind, s.dept, s.note].filter(Boolean).map(esc).join(" · ");
      return `<div class="srow ${state}">
        <div class="st tnum">${esc(s.at)}</div><div class="sdot"><i></i></div>
        <div class="sc"><b>${esc(s.title)}${state==="now"?' <span class="now-pill">СЕЙЧАС</span>':''}</b>${sub?`<small>${sub}</small>`:""}</div>
        ${canManage?`<div class="sacts"><button class="btn sm ghost" data-edit-sched="${s.id}" title="Изменить">✎</button><button class="btn sm danger" data-del-sched="${s.id}" title="Удалить">${I.trash}</button></div>`:""}</div>`;
    }).join("");
    el("main").innerHTML = head + banner + `<div class="sched-list">${rows}</div>`;
    tickClock();
  }
  function nextInfo(items, nm){
    const up = items.filter(s=> toMins(s.at) > nm).sort((a,b)=>toMins(a.at)-toMins(b.at))[0];
    if(!up) return `<div class="next-ev"><div class="lbl">Дальше</div><div style="color:var(--text-faint);font-size:13px">событий больше нет</div></div>`;
    const diff = toMins(up.at)-nm; const hh=Math.floor(diff/60), mm=diff%60;
    return `<div class="next-ev"><div class="lbl">Следующее · через ${hh?hh+" ч ":""}${mm} мин</div><div class="ne-t"><b>${esc(up.at)}</b> ${esc(up.title)}</div></div>`;
  }
  function sideAir(){
    const nm=minsNow();
    const up=(S.schedule||[]).filter(s=>toMins(s.at)>nm).sort((a,b)=>toMins(a.at)-toMins(b.at))[0];
    const news=(S.news||[])[0];
    let out = up
      ? `<div class="air-row"><div class="air-k">Следующее событие</div><div class="air-v"><b class="mono">${esc(up.at)}</b> ${esc(up.title)}</div></div>`
      : `<div class="air-row"><div class="air-k">События</div><div class="air-v" style="color:var(--text-faint)">не запланированы</div></div>`;
    if(news) out += `<div class="air-row"><div class="air-k">Последняя новость</div><div class="air-v">${news.level==="critical"?'<span style="color:var(--c-red)">● </span>':""}${esc(news.title)}</div></div>`;
    return out;
  }

  function parseImport(kind, text){
    text=(text||"").trim(); if(!text) return [];
    if(text[0]==="["){ let a; try{ a=JSON.parse(text); }catch(e){ throw {error:"Неверный JSON"}; } return Array.isArray(a)?a:[]; }
    const lines=text.split(/\n+/).map(l=>l.trim()).filter(Boolean);
    if(kind==="news") return lines.map(l=>({title:l}));
    return lines.map(l=>{ const m=l.match(/^(\d{1,2}:\d{2})[\s|,–\-]+(.+)$/); if(!m) return null;
      const parts=m[2].split("|").map(x=>x.trim()); return {at:m[1], title:parts[0], dept:parts[1]||"", kind:parts[2]||"event"}; }).filter(Boolean);
  }

  async function doImport(kind){ const err=el("imp-err"); if(err) err.textContent="";
    let items; try{ items=parseImport(kind, el("imp-text").value); }catch(ex){ if(err) err.textContent=ex.error||"Ошибка разбора"; return; }
    if(!items.length){ if(err) err.textContent="Не удалось распознать ни одной строки"; return; }
    const path = kind==="news" ? "/api/news/import" : "/api/schedule/import";
    try{ const r=await api(path,"POST",{items}); closeModal(); await refresh(); toast("Импортировано: "+(r.imported||0)); }
    catch(e){ if(e.status===401){handleAuthErr(e);} else if(err) err.textContent=e.error||"Ошибка"; } }

  /* ---------------- Render orchestration ---------------- */
  function renderAll(){ if(!S) return; renderRail(); renderTop(); renderMain(); renderSide(); }

  function tickClock(){
    const d=serverNow();
    const t=[d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,"0")).join(":");
    document.querySelectorAll(".js-clock").forEach(c=>{ c.innerHTML = t + (c.dataset.zone ? '<span class="zone">'+c.dataset.zone+'</span>' : ''); });
  }
  function startClock(){ if(clockTimer) return; tickClock(); clockTimer=setInterval(tickClock,1000); }
  function stopClock(){ if(clockTimer){ clearInterval(clockTimer); clockTimer=null; } }
  function startPoll(){ if(pollTimer) return; pollTimer=setInterval(async ()=>{
      if(el("modal-root").innerHTML) return;             // не мешаем при открытом окне
      if(U.view==="sensors" && !SENSOR_UI.loading && Date.now()-SENSOR_UI.loadedAt>60000) loadSensors(false);
      const ae=document.activeElement;
      const typing = ae && /^(INPUT|SELECT|TEXTAREA)$/.test(ae.tagName);
      const formView = (U.view==="finance" || U.view==="admin");  // формо-ёмкие разделы не трогаем
      const dirty = [...document.querySelectorAll('#main input, #main textarea')].some(x=>x.value && String(x.value).trim()!=="");
      try{
        const oldVer = S && S.version;
        const fresh=await api("/api/state"); S=fresh; ME=S.me; CAPS=S.caps;
        if(fresh.version === oldVer) return;               // данные не изменились — ничего не перерисовываем (сохраняем прокрутку/выделение)
        renderRail(); renderSide();
        if(!typing && !dirty && !formView) renderMain();   // основную область не пересобираем, пока заполняют форму
      }catch(e){ if(e&&e.status===401){ stopPoll(); ME=null; renderLogin(); } }
    }, 5000); }
  function stopPoll(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }

  /* ---------------- Event delegation ---------------- */
  document.addEventListener("click", (e)=>{
    const t=e.target.closest("[data-view],[data-filter],[data-ctype],[data-send-msg],[data-verify],[data-reject],[data-msg-task],[data-new-task],[data-task-start],[data-task-done],[data-task-save],[data-modal-close],[data-modal-bg],[data-mapobj],[data-toggle-theme],[data-logout],[data-new-user],[data-user-save],[data-urole],[data-udept],[data-upass],[data-utoggle],[data-udel],[data-pass-save],[data-reset-all],[data-new-news],[data-news-save],[data-del-news],[data-import-news],[data-new-sched],[data-sched-save],[data-del-sched],[data-edit-sched],[data-import-sched],[data-import-save],[data-show-license],[data-auth-tab],[data-show-terms],[data-dept-sel],[data-chan-send],[data-fin-send],[data-del-msg],[data-del-chan],[data-portal-open],[data-portal-go],[data-new-group],[data-group-save],[data-group-sel],[data-group-send],[data-del-group],[data-del-group-msg],[data-sensor-refresh],[data-sensor-type],[data-sensor-id]");
    if(!t) return;
    if(t.hasAttribute("data-view")){ U.view=t.getAttribute("data-view"); saveUI(); renderRail(); renderMain(); animateMain(); return; }
    if(t.hasAttribute("data-show-license")){ licenseModal(); return; }
    if(t.hasAttribute("data-auth-tab")){ authTab=t.getAttribute("data-auth-tab"); renderLogin(); return; }
    if(t.hasAttribute("data-show-terms")){ e.preventDefault(); termsModal(); return; }
    if(t.hasAttribute("data-portal-open")){ const b=el("portal-box"); if(b){ b.style.display="flex"; const ta=el("pt-token"); if(ta) ta.focus(); } return; }
    if(t.hasAttribute("data-portal-go")){ const ta=el("pt-token"); portalLogin(ta?ta.value:""); return; }
    if(t.hasAttribute("data-dept-sel")){ U.deptSel=t.getAttribute("data-dept-sel"); U.chanDraft=""; saveUI(); renderMain(); return; }
    if(t.hasAttribute("data-chan-send")){ sendChannel(t.getAttribute("data-chan-send")); return; }
    if(t.hasAttribute("data-new-group")){ groupModal(); return; }
    if(t.hasAttribute("data-group-save")){ saveGroup(); return; }
    if(t.hasAttribute("data-group-sel")){ U.groupSel=Number(t.getAttribute("data-group-sel")); U.groupDraft=""; saveUI(); renderMain(); return; }
    if(t.hasAttribute("data-group-send")){ sendGroup(Number(t.getAttribute("data-group-send"))); return; }
    if(t.hasAttribute("data-del-group")){ deleteGroup(Number(t.getAttribute("data-del-group"))); return; }
    if(t.hasAttribute("data-del-group-msg")){ const [gid,mid]=t.getAttribute("data-del-group-msg").split("|").map(Number); deleteGroupMessage(gid,mid); return; }
    if(t.hasAttribute("data-sensor-refresh")){ loadSensors(true); return; }
    if(t.hasAttribute("data-sensor-type")){ U.sensorType=t.getAttribute("data-sensor-type"); saveUI(); renderSensors(); return; }
    if(t.hasAttribute("data-sensor-id")){ U.sensorSelected=t.getAttribute("data-sensor-id"); saveUI(); renderSensors(); return; }
    if(t.hasAttribute("data-fin-send")){ financeSend(); return; }
    if(t.hasAttribute("data-del-msg")){ if(confirm("Удалить сообщение из ленты? (модерация)")){ (async()=>{ try{ await api("/api/messages/"+t.getAttribute("data-del-msg"),"DELETE"); await refresh(); toast("Сообщение удалено"); }catch(e){ handleAuthErr(e); } })(); } return; }
    if(t.hasAttribute("data-del-chan")){ if(confirm("Удалить сообщение из чата? (модерация)")){ (async()=>{ try{ await api("/api/channels/"+t.getAttribute("data-del-chan"),"DELETE"); await refresh(); toast("Сообщение удалено"); }catch(e){ handleAuthErr(e); } })(); } return; }
    if(t.hasAttribute("data-filter")){ U.filter=t.getAttribute("data-filter"); saveUI(); renderMain(); return; }
    if(t.hasAttribute("data-ctype")){ U.composerType=t.getAttribute("data-ctype"); saveUI(); renderMain(); return; }
    if(t.hasAttribute("data-send-msg")){ sendMessage(); return; }
    if(t.hasAttribute("data-verify")){ verifyMsg(t.getAttribute("data-verify"), true); return; }
    if(t.hasAttribute("data-reject")){ verifyMsg(t.getAttribute("data-reject"), false); return; }
    if(t.hasAttribute("data-msg-task")){ const m=S.messages.find(x=>String(x.id)===t.getAttribute("data-msg-task")); taskModal({title:m?m.text.slice(0,50):"", desc:m?("Из сообщения ("+((S.msg_types[m.type]||{}).label||"")+"): "+m.text):"", dept:m?m.dept:""}); return; }
    if(t.hasAttribute("data-new-task")){ taskModal(); return; }
    if(t.hasAttribute("data-task-start")){ taskStatus(t.getAttribute("data-task-start"),"prog"); return; }
    if(t.hasAttribute("data-task-done")){ taskStatus(t.getAttribute("data-task-done"),"done"); return; }
    if(t.hasAttribute("data-task-save")){ saveTask(); return; }
    if(t.hasAttribute("data-modal-close")){ closeModal(); return; }
    if(t.hasAttribute("data-modal-bg") && e.target===t){ closeModal(); return; }
    if(t.hasAttribute("data-mapobj")){ const o=S.map_objects.find(x=>String(x.id)===t.getAttribute("data-mapobj")); if(o) toast(o.label+(o.sev?(" · опасность: "+({high:"высокая",medium:"средняя",low:"низкая"}[o.sev])):"")); return; }
    if(t.hasAttribute("data-toggle-theme")){ cycleTheme(); return; }
    if(t.hasAttribute("data-logout")){ doLogout(); return; }
    if(t.hasAttribute("data-new-user")){ userModal(); return; }
    if(t.hasAttribute("data-user-save")){ saveUser(); return; }
    if(t.hasAttribute("data-upass")){ passModal(t.getAttribute("data-upass")); return; }
    if(t.hasAttribute("data-utoggle")){ const [id,act]=t.getAttribute("data-utoggle").split("|"); patchUser(id,{active:act==="1"}, act==="1"?"Доступ включён":"Доступ отключён"); return; }
    if(t.hasAttribute("data-udel")){ const id=t.getAttribute("data-udel"); const uu=(S.roster||[]).find(x=>String(x.id)===id); delUser(id, uu?uu.name:""); return; }
    if(t.hasAttribute("data-pass-save")){ savePass(t.getAttribute("data-pass-save")); return; }
    if(t.hasAttribute("data-reset-all")){ resetAll(); return; }
    if(t.hasAttribute("data-new-news")){ newsModal(); return; }
    if(t.hasAttribute("data-news-save")){ saveNews(); return; }
    if(t.hasAttribute("data-del-news")){ delNews(t.getAttribute("data-del-news")); return; }
    if(t.hasAttribute("data-import-news")){ importModal("news"); return; }
    if(t.hasAttribute("data-new-sched")){ schedModal(); return; }
    if(t.hasAttribute("data-sched-save")){ saveSched(t.getAttribute("data-sched-save")); return; }
    if(t.hasAttribute("data-del-sched")){ delSched(t.getAttribute("data-del-sched")); return; }
    if(t.hasAttribute("data-edit-sched")){ const s=(S.schedule||[]).find(x=>String(x.id)===t.getAttribute("data-edit-sched")); if(s) schedModal(s); return; }
    if(t.hasAttribute("data-import-sched")){ importModal("sched"); return; }
    if(t.hasAttribute("data-import-save")){ doImport(t.getAttribute("data-import-save")); return; }
  });
  document.addEventListener("change", (e)=>{
    const el2=e.target;
    if(el2.hasAttribute && el2.hasAttribute("data-urole")){ patchUser(el2.getAttribute("data-urole"),{role:el2.value},"Роль обновлена"); return; }
    if(el2.hasAttribute && el2.hasAttribute("data-udept")){ patchUser(el2.getAttribute("data-udept"),{dept:el2.value},"Департамент обновлён"); return; }
  });
  document.addEventListener("keydown",(e)=>{
    if(e.key==="Escape") closeModal();
    if(e.key==="Enter" && (e.ctrlKey||e.metaKey) && e.target && e.target.id==="groupText"){
      const b=document.querySelector("[data-group-send]"); if(b){ e.preventDefault(); sendGroup(Number(b.getAttribute("data-group-send"))); }
    }
  });

  document.addEventListener("change",(e)=>{
    if(e.target && e.target.id==="sensor-param"){
      U.sensorParam=e.target.value; saveUI(); renderSensors();
    }
  });

  document.addEventListener("input",(e)=>{
    if(!e.target || e.target.id!=="sensor-search") return;
    const pos=e.target.selectionStart, value=e.target.value;
    U.sensorSearch=value; saveUI(); renderSensors();
    const next=el("sensor-search");
    if(next){ next.focus(); const p=Math.min(pos==null?value.length:pos,value.length); next.setSelectionRange(p,p); }
  });

  boot();
})();
</script>
</body>
</html>
